<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30대 직장인 데일리 코디 추천</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --secondary-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #38bdf8;
            --accent-purple: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-active: rgba(56, 189, 248, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
        }

        .gender-toggle {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--secondary-bg);
            padding: 0.5rem;
            border-radius: 99px;
            border: 1px solid var(--glass-border);
        }

        .toggle-btn {
            padding: 0.8rem 2rem;
            border-radius: 99px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: var(--accent-blue);
            color: var(--primary-bg);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: slideUp 0.8s ease-out;
        }

        /* Top Featured Section */
        .featured-recommender {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
            background: var(--secondary-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .city-label {
            font-size: 0.9rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .weather-icon {
            font-size: 5rem;
            margin: 1rem 0;
        }

        .temp-display {
            font-size: 4rem;
            font-weight: 600;
        }

        .weather-desc {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .outfit-display {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .outfit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .outfit-tag {
            background: var(--card-active);
            color: var(--accent-blue);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .outfit-image-container {
            width: 100%;
            height: 450px;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.2);
        }

        .outfit-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .outfit-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .outfit-list li {
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .item-cat {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.2rem;
        }

        .item-val {
            font-size: 1rem;
            font-weight: 600;
        }

        /* 3-Day Forecast Cards */
        .forecast-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .forecast-card {
            background: var(--secondary-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
        }

        .forecast-card.active {
            background: var(--card-active);
            border-color: var(--accent-blue);
        }

        .day-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 0.5rem 0;
            display: block;
        }

        .forecast-temp {
            font-size: 1.2rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 850px) {
            .featured-recommender {
                grid-template-columns: 1fr;
            }

            .forecast-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="gender-toggle" id="gender-toggle-area">
            <button class="toggle-btn active" id="btn-men" onclick="setGender('men')">30대 남성</button>
            <button class="toggle-btn" id="btn-women" onclick="setGender('women')">30대 여성</button>
        </div>
        <p class="subtitle" id="main-subtitle">화이트 칼라 직격! 날씨 맞춤형 스마트 오피스룩</p>
    </header>

    <div class="main-container">
        <!-- Main Highlight -->
        <section class="featured-recommender">
            <div class="weather-info">
                <span class="city-label">Seoul, Korea</span>
                <span class="weather-icon" id="main-weather-icon">☀️</span>
                <div class="temp-display" id="main-temp">20°C</div>
                <div class="weather-desc" id="main-weather-desc">맑은 하늘</div>
                <div
                    style="margin-top: 1rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 12px; width: 100%;">
                    <div style="display: flex; justify-content: space-around;">
                        <div>
                            <span style="display:block; font-size: 0.8rem; color: var(--text-dim);">최고</span>
                            <span id="main-max">25°C</span>
                        </div>
                        <div>
                            <span style="display:block; font-size: 0.8rem; color: var(--text-dim);">최저</span>
                            <span id="main-min">12°C</span>
                        </div>
                        <div>
                            <span style="display:block; font-size: 0.8rem; color: var(--text-dim);">비 확률</span>
                            <span id="main-rain">10%</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="outfit-display">
                <div class="outfit-header">
                    <h2 id="day-title">내일의 추천 코디</h2>
                    <span class="outfit-tag" id="outfit-tag">Business Casual</span>
                </div>
                <div class="outfit-image-container" id="outfit-image">
                    <!-- Image will be injected -->
                </div>
                <ul class="outfit-list" id="outfit-list">
                    <!-- Items will be injected -->
                </ul>
            </div>
        </section>

        <!-- 3-Day Forecast Selectors -->
        <section class="forecast-row" id="forecast-row">
            <!-- Cards will be injected -->
        </section>
    </div>

    <script>
        const LAT = 37.5665;
        const LON = 126.9780;

        let currentGender = 'men';
        let selectedDayIndex = 0;
        let weatherForecast = [];

        const outfits = {
            men: {
                'Hot': {
                    tag: 'Summer Office',
                    image: 'https://images.unsplash.com/photo-1507679799987-c73779587ccf?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Top', name: '린넨 셔츠 (스카이 블루)' },
                        { cat: 'Bottom', name: '베이지 시어서커 슬랙스' },
                        { cat: 'Shoes', name: '가죽 로퍼' },
                        { cat: 'Accessory', name: '메탈 스트랩 워치' }
                    ]
                },
                'Sunny': {
                    tag: 'Premium Business',
                    image: 'https://images.unsplash.com/photo-1592755220551-5a2305ca75aa?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '라이트 블레이저' },
                        { cat: 'Top', name: '옥스포드 드레스 셔츠' },
                        { cat: 'Bottom', name: '네이비 테이퍼드 슬랙스' },
                        { cat: 'Shoes', name: '브라운 더비 슈즈' }
                    ]
                },
                'Rainy': {
                    tag: 'Urban Tech',
                    image: 'https://images.unsplash.com/photo-1543852084-298319e71fd1?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '베이지 트렌치 코트' },
                        { cat: 'Top', name: '화이트 드레스 셔츠' },
                        { cat: 'Bottom', name: '네이비 워터프루프 팬츠' },
                        { cat: 'Shoes', name: '검정 더비 슈즈' }
                    ]
                },
                'Cold': {
                    tag: 'Winter Classic',
                    image: 'https://images.unsplash.com/photo-1591084728795-1149f32d9866?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '차콜 캐시미어 코트' },
                        { cat: 'Top', name: '블랙 터틀넥 니트' },
                        { cat: 'Bottom', name: '다크 기모 울 슬랙스' },
                        { cat: 'Shoes', name: '가죽 첼시 부츠' }
                    ]
                },
                'Chilly': {
                    tag: 'Smart Layering',
                    image: 'https://images.unsplash.com/photo-1592755220551-5a2305ca75aa?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '퀼팅 베스트' },
                        { cat: 'Top', name: '스트라이프 셔츠' },
                        { cat: 'Bottom', name: '그래이 치노 패밀리' },
                        { cat: 'Shoes', name: '스웨이드 로퍼' }
                    ]
                }
            },
            women: {
                'Hot': {
                    tag: 'Summer Chic',
                    image: 'https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Top', name: '민소매 실크 블라우스' },
                        { cat: 'Bottom', name: '린넨 쿨 와이드 슬랙스' },
                        { cat: 'Shoes', name: '스트랩 샌들 힐' },
                        { cat: 'Accessory', name: '심플 골드 브레이슬릿' }
                    ]
                },
                'Sunny': {
                    tag: 'Modern Office',
                    image: 'https://images.unsplash.com/photo-1567333160937-c4524456a6f6?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Top', name: '타이 블라우스' },
                        { cat: 'Outer', name: '슬림핏 자켓' },
                        { cat: 'Bottom', name: 'A라인 미디 스커트' },
                        { cat: 'Shoes', name: '스틸레토 힐' }
                    ]
                },
                'Rainy': {
                    tag: 'Stylish Rainy',
                    image: 'https://images.unsplash.com/photo-1487222477894-8943e31ef7b2?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '네이비 후드 트렌치' },
                        { cat: 'Top', name: '면 반팔 니트' },
                        { cat: 'Bottom', name: '치마 바지 (큐롯)' },
                        { cat: 'Shoes', name: '레인 펌프스' }
                    ]
                },
                'Cold': {
                    tag: 'Cozy Professional',
                    image: 'https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '헤링본 울 코트' },
                        { cat: 'Top', name: '캐시미어 반목 니트' },
                        { cat: 'Bottom', name: '울 혼방 와이드 팬츠' },
                        { cat: 'Shoes', name: '삭스 부츠' }
                    ]
                },
                'Chilly': {
                    tag: 'Fall Layering',
                    image: 'https://images.unsplash.com/photo-1525507119028-ed4c629a60a3?auto=format&fit=crop&w=800&q=80',
                    items: [
                        { cat: 'Outer', name: '카멜 롱 가디건' },
                        { cat: 'Top', name: '라벤더 셔츠' },
                        { cat: 'Bottom', name: '펜슬 체크 스커트' },
                        { cat: 'Shoes', name: '태슬 로퍼' }
                    ]
                }
            }
        };

        const weatherIcons = {
            0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
            51: '🌧️', 53: '🌧️', 55: '🌧️', 61: '🌧️', 63: '🌧️', 65: '🌧️',
            71: '❄️', 73: '❄️', 75: '❄️', 95: '⛈️'
        };

        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max,relative_humidity_2m_max&timezone=Asia%2FSeoul`);
                const data = await response.json();

                weatherForecast = [];
                for (let i = 1; i <= 3; i++) {
                    weatherForecast.push({
                        date: data.daily.time[i],
                        max: Math.round(data.daily.temperature_2m_max[i]),
                        min: Math.round(data.daily.temperature_2m_min[i]),
                        code: data.daily.weathercode[i],
                        rain: data.daily.precipitation_probability_max[i]
                    });
                }
                updateForecastRow();
                updateMainUI();
            } catch (e) {
                console.error("Weather fetch failed:", e);
                // Simple hardcoded fallback for local testing
                weatherForecast = [
                    { date: 'Tomorrow', max: 15, min: 8, code: 0, rain: 5 },
                    { date: 'Next', max: 22, min: 12, code: 1, rain: 10 },
                    { date: 'Later', max: 13, min: 6, code: 61, rain: 80 }
                ];
                updateForecastRow();
                updateMainUI();
            }
        }

        function updateForecastRow() {
            const row = document.getElementById('forecast-row');
            const labels = ['내일', '모레', '글피'];
            row.innerHTML = weatherForecast.map((day, i) => `
                <div class="forecast-card ${i === selectedDayIndex ? 'active' : ''}" onclick="selectDay(${i})">
                    <span class="day-label">${labels[i]}</span>
                    <span class="forecast-icon">${weatherIcons[day.code] || '⛅'}</span>
                    <span class="forecast-temp">${day.max}°C / ${day.min}°C</span>
                </div>
            `).join('');
        }

        function updateMainUI() {
            const day = weatherForecast[selectedDayIndex];
            const titles = ['내일의 추천 코디', '모레의 추천 코디', '글피의 추천 코디'];

            document.getElementById('day-title').textContent = titles[selectedDayIndex];
            document.getElementById('main-weather-icon').textContent = weatherIcons[day.code] || '⛅';
            document.getElementById('main-temp').textContent = `${day.max}°C`;
            document.getElementById('main-max').textContent = `${day.max}°C`;
            document.getElementById('main-min').textContent = `${day.min}°C`;
            document.getElementById('main-rain').textContent = `${day.rain}%`;
            document.getElementById('main-weather-desc').textContent = getDayDesc(day);

            // Granular categorization logic
            let type = 'Sunny';
            if (day.rain > 40 || (day.code >= 51 && day.code <= 67)) {
                type = 'Rainy';
            } else if (day.max < 7) {
                type = 'Cold';
            } else if (day.max < 17) {
                type = 'Chilly';
            } else if (day.max >= 25) {
                type = 'Hot';
            } else {
                type = 'Sunny';
            }

            const outfit = outfits[currentGender][type];
            document.getElementById('outfit-tag').textContent = outfit.tag;
            document.getElementById('outfit-image').innerHTML = `<img src="${outfit.image}" alt="Outfit Recommendation" onerror="this.src='https://images.unsplash.com/photo-1487222477894-8943e31ef7b2?auto=format&fit=crop&w=500&q=80'">`;
            document.getElementById('outfit-list').innerHTML = outfit.items.map(item => `
                <li>
                    <span class="item-cat">${item.cat}</span>
                    <span class="item-val">${item.name}</span>
                </li>
            `).join('');
        }

        function getDayDesc(day) {
            if (day.code >= 51 && day.code <= 67) return '비 소식이 있어 우산이 필요합니다.';
            if (day.code >= 71 && day.code <= 77) return '눈이 올 수 있으니 미끄러움에 주의하세요.';
            if (day.max >= 22) return '햇살이 따스한 기분 좋은 날씨입니다.';
            return '선선하여 오피스룩을 즐기기 좋은 날씨입니다.';
        }

        window.setGender = (gender) => {
            currentGender = gender;
            document.getElementById('btn-men').classList.toggle('active', gender === 'men');
            document.getElementById('btn-women').classList.toggle('active', gender === 'women');
            updateMainUI();
        };

        window.selectDay = (index) => {
            selectedDayIndex = index;
            updateForecastRow();
            updateMainUI();
        };

        window.addEventListener('load', fetchWeather);
    </script>
</body>

</html>
